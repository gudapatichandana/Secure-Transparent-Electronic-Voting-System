version: '3.8'

services:
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: svs-backend-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=host.docker.internal # Adjust this based on your network or use NeonDB URL
      # - DATABASE_URL=${DATABASE_URL}
      # Load other environment variables as needed here
    restart: unless-stopped

  project-voter:
    build:
      context: ./project-voter
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=http://localhost:5000/api # Adjust for production target
    container_name: svs-project-voter
    ports:
      - "3000:80"
    depends_on:
      - backend-api
    restart: unless-stopped

  project-sys-admin:
    build:
      context: ./project-sys-admin
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=http://localhost:5000/api # Adjust for production target
    container_name: svs-project-sys-admin
    ports:
      - "3001:80"
    depends_on:
      - backend-api
    restart: unless-stopped

  project-election-admin:
    build:
      context: ./project-election-admin
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=http://localhost:5000/api # Adjust for production target
    container_name: svs-project-election-admin
    ports:
      - "3002:80"
    depends_on:
      - backend-api
    restart: unless-stopped
