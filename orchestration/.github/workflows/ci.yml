name: Deploy to Vercel and Render

on:
  push:
    branches:
      - main
  pull_request: # Only run tests on PRs, not deployments
    branches:
      - main

jobs:
  test-and-build:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: voting_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm run install:all
        
      - name: Initialize Database
        env:
          DB_USER: postgres
          DB_HOST: 127.0.0.1
          DB_PASSWORD: password
          DB_NAME: voting_db
          DB_PORT: 5432
        run: node backend-api/scripts/init_db_for_ci.js

      - name: Run Tests
        env:
          DB_USER: postgres
          DB_HOST: 127.0.0.1
          DB_PASSWORD: password
          DB_NAME: voting_db
          DB_PORT: 5432
          JWT_SECRET: test_secret_key_123
        # Ensure your test scripts in package.json don't hang!
        run: npm run test:all

  deploy-frontends:
    name: Deploy React Apps to Vercel
    runs-on: ubuntu-latest
    needs: test-and-build # Will only run if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
        
      # ==========================================
      # 1. Deploy project-voter
      # ==========================================
      - name: Deploy project-voter
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_VOTER }}

      # ==========================================
      # 2. Deploy project-election-admin
      # ==========================================
      - name: Deploy project-election-admin
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ELECTION_ADMIN }}

      # ==========================================
      # 3. Deploy project-observer
      # ==========================================
      - name: Deploy project-observer
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_OBSERVER }}

      # ==========================================
      # 4. Deploy project-sys-admin
      # ==========================================
      - name: Deploy project-sys-admin
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SYS_ADMIN }}

      # ==========================================
      # 5. Deploy project-voter-registration
      # ==========================================
      - name: Deploy project-voter-registration
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_VOTER_REG }}

      # ==========================================
      # 6. Deploy project-reg-obs-app
      # ==========================================
      - name: Deploy project-reg-obs-app
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_REG_OBS_APP }}

  deploy-backend:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    needs: test-and-build # Will only run if tests pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # Render provides a specific URL you ping to trigger a rebuild
      - name: Trigger Render Deploy Hook
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
